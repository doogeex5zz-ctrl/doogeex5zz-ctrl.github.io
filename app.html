<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додаток - PollMaker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body>

    <header class="bg-primary shadow-sm">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
                <a class="navbar-brand fw-bold" href="login.html">📊 PollMaker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto nav-pills">
                        <li class="nav-item"><a class="nav-link text-white" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="register.html">Реєстрація</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link text-white active" href="app.html">Створити опитування</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="about.html">Про додаток</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 text-center">Створення нового опитування</h2>
                <div class="card border-primary shadow-sm">
                    <div class="card-header bg-primary text-white">
                        Конструктор запитання
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Ваше запитання:</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Наприклад: Яка ваша улюблена мова програмування?">
                            </div>
                            
                            <label class="form-label fw-bold">Варіанти відповідей:</label>
                            <div class="mb-2 input-group">
                                <span class="input-group-text">1</span>
                                <input type="text" class="form-control" placeholder="Варіант 1">
                            </div>
                            <div class="mb-2 input-group">
                                <span class="input-group-text">2</span>
                                <input type="text" class="form-control" placeholder="Варіант 2">
                            </div>
                            <div class="mb-3 input-group">
                                <span class="input-group-text">3</span>
                                <input type="text" class="form-control" placeholder="Варіант 3">
                            </div>

                            <button type="button" class="btn btn-outline-secondary btn-sm mb-4">+ Додати ще варіант</button>
                            
                            <hr>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Зберегти та опублікувати опитування</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-3 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 PollMaker. Всі права захищено.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
